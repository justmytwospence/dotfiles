## settings

# Terminal true color + cursor style
set-option -as terminal-features ",xterm-ghostty:RGB:cstyle"
set-option -as terminal-features ",xterm-256color:RGB:cstyle"
# Undercurl support (vim/nvim diagnostics)
set-option -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set-option -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
# Clipboard sync via OSC 52
set-option -g set-clipboard on
# Escape sequence passthrough (images, notifications)
set-option -g allow-passthrough on
# Extended keys (Ctrl+Shift combos)
set-option -g extended-keys on
set-option -wg aggressive-resize on
set-option -wg allow-rename on
set-option -wg automatic-rename on
set-option -wg base-index 1
set-option -wg default-terminal "tmux-256color"
set-option -g escape-time 0
set-option -g focus-events on
set-option -g history-limit 100000
set-option -wg monitor-activity off
set-option -wg mouse on
set-option -wg pane-base-index 1
set-option -wg renumber-windows on
set-option -g repeat-time 700
set-option -g status-interval 1

## keybindings

bind-key & kill-window # no prompt
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel
bind-key x kill-pane # no prompt
set-option -wg mode-keys vi
set-option -g status-keys emacs

# swap windows
bind-key -r '<' swap-window -dt -1
bind-key -r '>' swap-window -dt +1

# repeatable switching
bind-key -r C-n next-window
bind-key -r C-o select-pane -t :.+
bind-key -r C-p previous-window
bind-key -r Space next-layout

# panes
bind-key % split-window -c "#{pane_current_path}"
bind-key '"' split-window -h -c "#{pane_current_path}"
bind-key -r C-h resize-pane -L 5
bind-key -r C-j resize-pane -D 5
bind-key -r C-k resize-pane -U 5
bind-key -r C-l resize-pane -R 5
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

## theme

# status bar
set-option -g status-style 'bg=default,fg=white,bold'
set-option -g status-left "#{?client_prefix,#[fg=yellow],#[fg=white]}#(whoami)#{?client_prefix,#[fg=yellow],#[fg=cyan]}@#h#{?client_prefix,#[fg=yellow],#[fg=white]}:#S "
set-option -g status-left-length 40
set-option -g status-right ''

# windows
set-option -g window-status-activity-style 'fg=black,bg=white'
set-option -g window-status-current-format " #I:#W "
set-option -g window-status-current-style 'fg=black,bg=cyan'
set-option -g window-status-format " #I:#W "
set-option -g window-status-style 'fg=white,dim'

# panes
set-option -g pane-border-lines heavy
set-option -g display-panes-active-colour cyan
set-option -g display-panes-colour brightblack

# clock mode
set-option -g clock-mode-colour blue
